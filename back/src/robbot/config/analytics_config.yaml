    - agendamento
    - marcar
    - consulta
    - horário
    - disponível
    - vaga
    - data
  Preços:
    - preço
    - valor
    - custo
    - quanto
    - pagar
    - pagamento
    - orçamento
    - cobrar
  Localização:
    - localização
    - endereço
    - onde
    - fica
    - chegar
    - mapa
    - rota
  Procedimentos:
    - procedimento
    - tratamento
    - serviço
    - plano
    - tipo
    - opções
    - oferece
  Reagendamento:
