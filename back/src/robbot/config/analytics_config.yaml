# Analytics Configuration
# Este arquivo centraliza lógica de negócio que estava hardcoded em SQL

# P3 #3: Sentiment Analysis Configuration
# Fallback strategy: regex (rápido, grátis) → Gemini API (preciso, pago)
sentiment_analysis:
  # Estratégia primária: regex (local, sem custo)
  use_regex: true
  
  # Estratégia secundária: Gemini API (requer custo, ativa apenas se false_positive_rate > threshold)
  gemini_fallback:
    enabled: true
    threshold_false_positive_rate: 30.0  # % - ativa Gemini se regex falhar em >30% dos casos
    batch_size: 50  # mensagens por batch (reduz chamadas API)
    cache_ttl_seconds: 86400  # 24h - cache de resultados Gemini
  
  # Modelo Gemini para sentiment
  gemini_model: "gemini-1.5-flash"  # mais barato e rápido que gemini-pro
  
  # Prompt template para Gemini
  gemini_prompt: |
    Analise o sentimento da seguinte mensagem de cliente.
    Classifique como: POSITIVE, NEGATIVE ou NEUTRAL.
    
    Mensagem: "{message}"
    
    Retorne APENAS uma palavra: POSITIVE, NEGATIVE ou NEUTRAL.

# Stop words para análise de keywords (português brasileiro)
