  - para
  - com
  - que
  - por
  - uma
  - esse
  - essa
  - como
  - mais
  - pela
  - pelo
  - muito
  - está
  - tem
  - aqui
  - quando
  - onde
  - quem
  - qual
  - seu
  - sua
  - isso
  - este
  - esta
  - pode
  - fazer
  - sobre
  - até
  - também
  - ainda
  - foi
  - ser
  - vai

# Análise de sentimento (expandido com n-grams e negações)
sentiment_keywords:
  positive:
    - obrigad
    - legal
    - ótimo
    - excelente
    - bom
    - perfeito
    - maravilh
    - adorei
    - amei
    - top
    - show
    - bacana
    - muito bom
    - super bom
    - gostei muito
    - ficou ótimo
    - atendimento excelente
    - bem atendido
    - nota 10
  negative:
    - ruim
    - péssimo
    - horrível
    - problema
    - erro
    - demora
    - insatisfeit
    - cancelar
    - reclamar
    - não gostei
    - muito ruim
    - mal atendido
    - decepcion
    - frustrad
    - lament
    - arrependid
  neutral:
    - dúvida
    - pergunta
    - informação
    - gostaria
    - poderia
    - quando
    - onde
  negation_modifiers:
    - não
    - nem
    - nunca
    - jamais

# Topics de classificação (regex patterns)
