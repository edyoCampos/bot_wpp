# Performance alerts thresholds
performance_thresholds:
  latency_ms: 5000  # 5 segundos
  error_rate_percent: 5.0  # 5%
  active_conversations_warning: 50
  active_conversations_critical: 100
  realtime_window_minutes: 5

# Cache TTL configurations (em segundos)
cache_ttl:
  realtime: 30       # 30 segundos - dados real-time
  metrics: 900       # 15 minutos - métricas agregadas
  historical: 3600   # 1 hora - dados históricos
  reports: 1800      # 30 minutos - relatórios completos
